reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      Griffith University has no unified, self-service developer portal, but real,
      standards-based public APIs were verified live. The Griffith Research Online (GRO)
      repository runs DSpace 7.6 and returns a working REST API root and an OAI-PMH 2.0
      Identify response. The Canvas LMS REST API documentation is publicly reachable. Active
      GitHub organizations exist for the Library and eResearch Services. The main public
      website and LinkedIn page return bot-protection codes (403/999) to automated probes but
      resolve in a browser. No course, timetable, or identity APIs were found openly
      documented. No endpoints were fabricated; only confirmed URLs are recorded.
    endpoints:
      - url: https://research-repository.griffith.edu.au/server/api
        status: 200
        note: DSpace 7.6 REST API root; returns JSON identifying "Griffith Research Online".
      - url: https://research-repository.griffith.edu.au/oai/request?verb=Identify
        status: 200
        note: OAI-PMH 2.0 Identify; repositoryName "Griffith Research Online", protocolVersion 2.0.
      - url: https://research-repository.griffith.edu.au/oai/request?verb=ListMetadataFormats
        status: 200
        note: OAI-PMH ListMetadataFormats responds; harvesting supported.
      - url: https://research-repository.griffith.edu.au/
        status: 200
        note: Griffith Research Online repository home page.
      - url: https://lms.griffith.edu.au/doc/api/index.html
        status: 200
        note: Canvas (Instructure) LMS REST API docs; live access requires auth credentials.
      - url: https://github.com/GriffithUniLibrary
        status: 200
        note: Griffith University Library GitHub organization (verified, active repos).
      - url: https://github.com/gu-eresearch
        status: 200
        note: eResearch Services - Griffith University GitHub organization (verified).
      - url: https://www.griffith.edu.au/
