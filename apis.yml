  - aid: griffith:gro-rest
    name: Griffith Research Online (GRO) DSpace REST API
    description: >-
      REST API for Griffith Research Online, the university's institutional repository,
      running on DSpace 7.6. Provides programmatic access to communities, collections,
      items, bitstreams, and metadata for Griffith research outputs. The API root at
      /server/api confirms the live DSpace REST interface.
    humanURL: https://research-repository.griffith.edu.au/
