---
aid: griffith
name: Griffith University
description: >-
  Griffith University is a public research university in Queensland, Australia, ranked
  #255 in the QS World University Rankings 2025. Its public, machine-readable developer
  footprint centers on research and library infrastructure rather than a formal developer
  portal. Griffith Research Online (GRO), the institutional repository, runs on DSpace 7.6
  and exposes both a REST API and an OAI-PMH 2.0 endpoint for harvesting publication and
  research-output metadata. The university also operates a Canvas LMS instance whose
  Instructure REST API documentation is publicly reachable, and maintains active GitHub
  organizations for its Library and eResearch Services teams. No unified, self-service
  Griffith developer portal was found; most administrative, course, timetable, and identity
  interfaces are gated behind institutional affiliation.
