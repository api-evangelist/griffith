        url: https://research-repository.griffith.edu.au/
  - aid: griffith:gro-oai
    name: Griffith Research Online OAI-PMH
    description: >-
      OAI-PMH 2.0 metadata harvesting endpoint for Griffith Research Online. Supports the
      standard OAI verbs (Identify, ListMetadataFormats, ListRecords, etc.) for harvesting
      Dublin Core and other metadata describing Griffith publications and research outputs.
    humanURL: https://research-repository.griffith.edu.au/
    baseURL: https://research-repository.griffith.edu.au/oai/request
    tags: [ OAI-PMH, Repository, Research, Metadata, Harvesting ]
    properties:
