        url: https://researchdata.edu.au/griffith-research-online-oai-protocol/8941
  - aid: griffith:canvas-lms
    name: Griffith Canvas LMS REST API
    description: >-
      Griffith University operates a Canvas (Instructure) learning management system at
      lms.griffith.edu.au. The Canvas LMS REST API documentation is publicly reachable and
      describes endpoints for courses, enrollments, assignments, and developer keys. Live
      API access requires authentication and institutional credentials, and Instructure has
      noted the docs will redirect to its central developer portal after July 1, 2026.
    humanURL: https://lms.griffith.edu.au/doc/api/index.html
    tags: [ LMS, Canvas, Instructure, Teaching, Learning ]
    properties:
      - type: Documentation
        url: https://lms.griffith.edu.au/doc/api/index.html
